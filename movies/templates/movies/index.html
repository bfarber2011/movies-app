{%extends 'movies/_base.html'%}
<html>
    <body>
        {%block content%}
        <h1>My Fav Movies</h1>
        {% if movies %}
         <ul>
            {%for movie in movies %}
            <li><h3>{{movie|title}}</h3></li>
            {% endfor %}
         </ul>
        {% else %}   
        <p>No Fav Movies...</p>
        {% endif %}
        {%endblock%}
    </body>
</html>
